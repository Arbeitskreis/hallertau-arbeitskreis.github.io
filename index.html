<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="description" content="Historischer Arbeitskreis Hallertau - Dokumentenverzeichnis der Mitglieder">
<meta name="robots" content="noindex,nofollow">
<title>Historischer Arbeitskreis Hallertau - Literaturverzeichnis der Mitglieder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 {
    font-size: 1.8em;
    margin: 0
}

h2 {
    font-size: 1.2em;
    font-weight: normal;
    margin-top: 5px;   /* kleiner (5px) Abstand nach oben */
}

.header {
    margin-top: 10px;
}

.button-group {
    margin-bottom: 10px;
}

.button-group a {
    display: inline-block; /* wichtig bei breiten Buttons */
    margin-bottom: 5px;    /* falls sie umbrechen */
    text-decoration: none;
    padding: 8px 14px;
    margin: 0 30px 0 30px;   /*oben, rechts, unten, links*/
    background-color: #2c7be5;
    color: white;
    border-radius: 5px;
    font-size: 0.9em;
}

.button-group a:hover {
    background-color: #1a5fc1;
}

table {
    border-collapse: collapse;
//    width: 100%;
    width: 800px;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 5px 10px 5px 10px;      /*oben, rechts, unten, links*/ 
/*   padding: 8px;  */
    text-align: left;
    vertical-align: top;
}

th {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #f9f9f9;
}

/* sorgt dafür, dass lange Inhalte sauber umbrechen */
td {
    word-break: break-word;
}
</style>

</head>

<body>

<div class="header">
    <h1>Übersicht verschiedener Literatur im Arbeitskreis</h1>
    <h2>(mit Datum der Kenntnisnahme von den Mitgliedern)</h2>
</div>

<div class="button-group">
    <a href="https://e.pcloud.link/publink/show?code=kZlUSGZogIdW99JJvQPTFdJ88KHebgN7Guy" target="_blank">Sterbebilder</a>
    <a href="https://e.pcloud.link/publink/show?code=kZkUSGZbkNeDdBh2gVy6AFnhtoJcVlfvRc7" target="_blank">Dokumente</a>
</div>

<table>
    <thead>
        <tr>
            <th>Datum</th>
            <th>Titel / Verzeichnis</th>
            <th>Autor</th>
        </tr>
    </thead>

    <tbody id="tabellen-inhalt">
        <!-- Hier wird die Tabelle geladen -->
    </tbody>
</table>

<!--  hier werden die Daten gepflegt -->
<script>
const csvUrl = "https://e.pcloud.link/publink/show?code=XZHrjvZW5Hs4Gv6sjfU6Fdvv0H0qRnYBRly&download=1";

fetch(csvUrl)
    .then(response => response.text())
    .then(data => {
        const rows = data.split("\n");
        const tableBody = document.getElementById("tabellen-inhalt");
        rows.forEach((row, index) => {
            if(index === 0) return; // Kopfzeile überspringen (optional)

            const cols = row.split(";");
            if(cols.length < 3) return;

            const tr = document.createElement("tr");

            cols.forEach(col => {
                const td = document.createElement("td");
                td.innerHTML = col.trim();
                tr.appendChild(td);
            });

            tableBody.appendChild(tr);
        });
    })
    .catch(error => console.error("Fehler beim Laden der CSV:", error));
</script>

</body>
</html>
